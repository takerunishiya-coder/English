<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>英タンゴ復習するンゴ</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <button id="backBtn" class="icon-btn" hidden aria-label="戻る">←</button>
    <h1 id="title">英タンゴ復習するンゴ</h1>
    <button id="settingsBtn" class="icon-btn" aria-label="設定">⚙</button>
  </header>

  <main id="app">
    <!-- File list view -->
    <section id="fileListView" class="view">
      <p class="hint">学習する単語ファイルを選択してください</p>
      <ul id="fileList" class="file-list"></ul>
      <p id="fileListEmpty" class="empty" hidden>
        単語ファイルが見つかりません。<br />
        <code>vocab/</code> フォルダに <code>.md</code> ファイルを追加し、<br />
        <code>vocab/index.json</code> にファイル名を登録してください。
      </p>
    </section>

    <!-- Player view -->
    <section id="playerView" class="view" hidden>
      <div id="progressBar"><div id="progressFill"></div></div>
      <p id="positionText" class="position-text">0 / 0</p>

      <article id="card" class="card">
        <h2 id="wordText" class="word">—</h2>
        <p id="meaningText" class="meaning">　</p>
        <p id="exampleText" class="example">　</p>
        <p id="exampleJaText" class="example-ja">　</p>
      </article>

      <div class="controls">
        <button id="prevBtn" class="ctl-btn" aria-label="前へ">⏮</button>
        <button id="playBtn" class="ctl-btn primary" aria-label="再生 / 停止">▶</button>
        <button id="nextBtn" class="ctl-btn" aria-label="次へ">⏭</button>
      </div>

      <div class="secondary-controls">
        <button id="repeatBtn" class="chip" aria-pressed="false">リピート</button>
        <button id="shuffleBtn" class="chip" aria-pressed="false">シャッフル</button>
        <button id="autoBtn" class="chip" aria-pressed="true">自動送り</button>
      </div>

      <details class="word-list-toggle">
        <summary>単語リストを表示</summary>
        <ol id="wordList" class="word-list"></ol>
      </details>
    </section>

    <!-- Settings view -->
    <section id="settingsView" class="view" hidden>
      <h2>設定</h2>

      <div class="setting">
        <label for="enVoice">英語の声</label>
        <select id="enVoice"></select>
      </div>
      <div class="setting">
        <label for="jaVoice">日本語の声</label>
        <select id="jaVoice"></select>
      </div>

      <div class="setting">
        <label for="rate">読み上げ速度: <span id="rateLabel">1.0</span></label>
        <input type="range" id="rate" min="0.5" max="1.5" step="0.05" value="1.0" />
      </div>

      <div class="setting">
        <label for="pauseMs">単語間のポーズ (ms): <span id="pauseLabel">600</span></label>
        <input type="range" id="pauseMs" min="0" max="3000" step="100" value="600" />
      </div>

      <div class="setting">
        <label><input type="checkbox" id="speakMeaning" checked /> 日本語の意味を読み上げる</label>
      </div>
      <div class="setting">
        <label><input type="checkbox" id="speakExample" checked /> 例文を読み上げる</label>
      </div>
      <div class="setting">
        <label><input type="checkbox" id="speakExampleJa" checked /> 例文の日本語訳も読み上げる</label>
      </div>
      <div class="setting">
        <label for="repeatWord">英単語のリピート回数</label>
        <select id="repeatWord">
          <option value="1">1回</option>
          <option value="2" selected>2回</option>
          <option value="3">3回</option>
        </select>
      </div>

      <div class="setting">
        <label><input type="checkbox" id="wakeLock" checked /> 再生中は画面をスリープさせない</label>
      </div>

      <p class="hint">設定はこの端末のブラウザに自動保存されます。</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

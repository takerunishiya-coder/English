name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need a real (non-shallow) checkout so the audio-commit step can
          # push back to main without fast-forward errors.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build vocab/index.json from .md files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p vocab
          python3 - <<'PY'
          import json
          from pathlib import Path
          vocab_dir = Path("vocab")
          files = sorted(
              p.name for p in vocab_dir.glob("*.md") if p.is_file()
          )
          out = {"files": [{"path": f, "label": f[:-3]} for f in files]}
          (vocab_dir / "index.json").write_text(
              json.dumps(out, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print("Generated vocab/index.json with", len(files), "files")
          PY
          cat vocab/index.json

      - name: Install TTS toolchain (espeak-ng + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends espeak-ng ffmpeg
          espeak-ng --version | head -1
          ffmpeg -version | head -1

      - name: Pre-generate vocabulary audio
        run: python3 scripts/generate_audio.py

      - name: Commit generated audio back to repo
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vocab/audio vocab/index.json
          if git diff --staged --quiet; then
            echo "No audio changes to commit."
            exit 0
          fi
          git commit -m "chore(audio): regenerate TTS audio for vocab updates [skip ci]"
          # Retry push a few times in case of races against concurrent pushes.
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed (attempt $i). Rebasing and retrying..."
            git pull --rebase origin main || true
            sleep $((i * 2))
          done
          echo "Failed to push generated audio." >&2
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

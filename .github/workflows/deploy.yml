name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build vocab/index.json from .md files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p vocab
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          vocab_dir = Path("vocab")
          files = sorted(
              p.name for p in vocab_dir.glob("*.md") if p.is_file()
          )
          out = {"files": [{"path": f, "label": f[:-3]} for f in files]}
          (vocab_dir / "index.json").write_text(
              json.dumps(out, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print("Generated vocab/index.json with", len(files), "files")
          PY
          cat vocab/index.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
